name: Build and Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]"
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            exe_name: PythiaJS.exe
          - os: ubuntu-22.04
            platform: linux-x64
            exe_name: PythiaJS
          - os: macos-13
            platform: macos-x64
            exe_name: PythiaJS
          - os: macos-14
            platform: macos-arm64
            exe_name: PythiaJS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Resolve Bun executable
        shell: bash
        run: |
          set -euo pipefail

          candidates=()
          if command -v bun >/dev/null 2>&1; then
            candidates+=("$(command -v bun)")
          fi
          if [ -n "${HOME:-}" ]; then
            candidates+=("$HOME/.bun/bin/bun" "$HOME/.bun/bin/bun.exe")
          fi
          if [ -n "${USERPROFILE:-}" ]; then
            candidates+=("$USERPROFILE/.bun/bin/bun.exe" "$USERPROFILE/.bun/bin/bun")
          fi

          for candidate in "${candidates[@]}"; do
            if [ -n "$candidate" ] && [ -x "$candidate" ]; then
              echo "BUN_EXECUTABLE=$candidate" >> "$GITHUB_ENV"
              echo "Using Bun executable: $candidate"
              exit 0
            fi
          done

          echo "Unable to locate Bun after setup-bun." >&2
          printf 'PATH=%s\n' "$PATH" >&2
          exit 1

      - name: Install dependencies
        shell: bash
        timeout-minutes: 15
        run: |
          set -euo pipefail
          "$BUN_EXECUTABLE" install

      - name: Build executable
        timeout-minutes: 20
        shell: pwsh
        run: |
          $buildArgs = @(
            'build'
            '--compile'
            'index.js'
            '--outfile'
            "dist/${{ matrix.exe_name }}"
          )

          if ($IsWindows) {
            $buildArgs += @(
              '--windows-icon'
              'src/ui/pic/PythiaJS.ico'
            )
          }

          & $env:BUN_EXECUTABLE @buildArgs

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          New-Item -ItemType Directory -Path release/src -Force | Out-Null
          New-Item -ItemType Directory -Path release/src/ui -Force | Out-Null

          Copy-Item "dist/${{ matrix.exe_name }}" "release/${{ matrix.exe_name }}" -Force
          Copy-Item "config.json" "release/config.json" -Force
          if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}" | Set-Content "release/version.txt"
          } else {
            "dev" | Set-Content "release/version.txt"
          }
          if (Test-Path "pythia.db") {
            Copy-Item "pythia.db" "release/pythia.db" -Force
          }

          # Server reads UI assets from src/ui at runtime.
          Copy-Item "src/ui/*" "release/src/ui" -Recurse -Force

          if (-not $IsWindows) {
            Copy-Item "src/ui/pic/PythiaJSIMG.png" "release/PythiaJS.png" -Force
          }

          # Server serves script modules at runtime.
          New-Item -ItemType Directory -Path release/src/script -Force | Out-Null
          Copy-Item "src/script/*" "release/src/script" -Recurse -Force

          # Base SQLite database for first-run initialization
          New-Item -ItemType Directory -Path release/src/db/base -Force | Out-Null
          Copy-Item "src/db/base/pythia.base.db" "release/src/db/base/pythia.base.db" -Force

          @"
          PythiaJS

          Run instructions:
          - Windows: double-click PythiaJS.exe
          - Linux: make executable and run from terminal
            chmod +x ./PythiaJS
            ./PythiaJS
          - macOS: unzip the app, move it to /Applications, then try right-click > Open
          - macOS: if Gatekeeper blocks launch, run:
            xattr -dr com.apple.quarantine /Applications/PythiaJS.app
            open /Applications/PythiaJS.app

          Notes:
          - This package expects bundled src/ui assets beside the executable.
          - Release version is read from version.txt and shown in the app footer.
          - WebView runtime must be available on the target OS.
          - Linux/macOS bundles include PythiaJS.png at the package root for launcher or app-icon setup.
          - macOS releases are unsigned zip archives intended for advanced users.
          - A Gatekeeper warning on macOS is expected and may require manual approval or quarantine removal.
          "@ | Set-Content "release/RUN.txt"

      - name: Smoke test staged binary
        timeout-minutes: 5
        shell: pwsh
        run: |
          $testPort = 48731
          $exePath = (Resolve-Path "release/${{ matrix.exe_name }}").Path
          if (-not $IsWindows) {
            chmod +x $exePath
          }

          $env:PYTHIA_NO_BROWSER = "1"
          $env:PYTHIA_BROWSER_MODE = "1"
          $env:PYTHIA_PORT = "$testPort"
          $workDir = (Resolve-Path "release").Path
          $stdoutLog = Join-Path $workDir "smoke-stdout.log"
          $stderrLog = Join-Path $workDir "smoke-stderr.log"
          if (Test-Path $stdoutLog) { Remove-Item $stdoutLog -Force }
          if (Test-Path $stderrLog) { Remove-Item $stderrLog -Force }

          $proc = Start-Process -FilePath $exePath -WorkingDirectory $workDir -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -PassThru

          try {
            $ready = $false
            for ($i = 0; $i -lt 120; $i++) {
              Start-Sleep -Milliseconds 500

              if ($proc.HasExited) {
                $stdout = (Test-Path $stdoutLog) ? (Get-Content $stdoutLog -Raw) : ''
                $stderr = (Test-Path $stderrLog) ? (Get-Content $stderrLog -Raw) : ''
                throw "Staged binary exited early with code $($proc.ExitCode)`nSTDOUT:`n$stdout`nSTDERR:`n$stderr"
              }

              try {
                $resp = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:$testPort/api/getConnections" -TimeoutSec 2
                if ($resp.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              } catch {
                # Keep retrying until timeout.
              }
            }

            if (-not $ready) {
              $stdout = (Test-Path $stdoutLog) ? (Get-Content $stdoutLog -Raw) : ''
              $stderr = (Test-Path $stderrLog) ? (Get-Content $stderrLog -Raw) : ''
              throw "Staged binary smoke test failed: API did not become ready on port $testPort`nSTDOUT:`n$stdout`nSTDERR:`n$stderr"
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Create macOS app bundle
        if: runner.os == 'macOS'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          app_root="release/PythiaJS.app"
          contents_dir="$app_root/Contents"
          macos_dir="$contents_dir/MacOS"
          resources_dir="$contents_dir/Resources"
          iconset_dir="$RUNNER_TEMP/PythiaJS.iconset"
          icon_source="src/ui/pic/PythiaJSIMG.png"

          rm -rf "$app_root" "$iconset_dir"
          mkdir -p "$macos_dir" "$resources_dir" "$iconset_dir"

          cp "release/${{ matrix.exe_name }}" "$macos_dir/PythiaJS"
          chmod +x "$macos_dir/PythiaJS"
          cp "release/config.json" "$macos_dir/config.json"
          cp "release/version.txt" "$macos_dir/version.txt"
          cp -R "release/src" "$macos_dir/src"
          cp "release/RUN.txt" "$resources_dir/RUN.txt"
          app_version="$(tr -d '\r\n' < release/version.txt)"

          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" "$icon_source" --out "$iconset_dir/icon_${size}x${size}.png" >/dev/null
            retina_size=$((size * 2))
            sips -z "$retina_size" "$retina_size" "$icon_source" --out "$iconset_dir/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$iconset_dir" -o "$resources_dir/PythiaJS.icns"

          cat > "$contents_dir/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>PythiaJS</string>
            <key>CFBundleExecutable</key>
            <string>PythiaJS</string>
            <key>CFBundleIconFile</key>
            <string>PythiaJS.icns</string>
            <key>CFBundleIdentifier</key>
            <string>org.pythiajs.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>PythiaJS</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$app_version</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Package non-macOS zip
        if: runner.os != 'macOS'
        shell: pwsh
        run: |
          $zipName = "PythiaJS-${{ matrix.platform }}.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "release/*" -DestinationPath $zipName

      - name: Package macOS zip
        if: runner.os == 'macOS'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          zip_name="PythiaJS-${{ matrix.platform }}.zip"
          rm -f "$zip_name"
          ditto -c -k --sequesterRsrc --keepParent "release/PythiaJS.app" "$zip_name"

      - name: Upload non-macOS artifact
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: PythiaJS-${{ matrix.platform }}
          path: PythiaJS-${{ matrix.platform }}.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: PythiaJS-${{ matrix.platform }}
          path: PythiaJS-${{ matrix.platform }}.zip

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: PythiaJS-*
          merge-multiple: true
          path: release-assets

      - name: Verify at least one artifact exists
        id: artifact_check
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifacts were produced. Skipping release publish."
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          echo "Artifacts to publish:"
          ls -1 release-assets/*

      - name: Publish release assets
        if: steps.artifact_check.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
          generate_release_notes: true
