name: Build and Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]"
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            exe_name: PythiaJS.exe
          - os: ubuntu-22.04
            platform: linux-x64
            exe_name: PythiaJS
          - os: macos-13
            platform: macos-x64
            exe_name: PythiaJS
          - os: macos-14
            platform: macos-arm64
            exe_name: PythiaJS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Build executable
        shell: pwsh
        run: |
          $buildArgs = @(
            'build'
            '--compile'
            'index.js'
            '--outfile'
            "dist/${{ matrix.exe_name }}"
          )

          if ($IsWindows) {
            $buildArgs += @(
              '--windows-icon'
              'src/ui/pic/PythiaJS.ico'
            )
          }

          bun @buildArgs

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          New-Item -ItemType Directory -Path release/src -Force | Out-Null
          New-Item -ItemType Directory -Path release/src/ui -Force | Out-Null

          Copy-Item "dist/${{ matrix.exe_name }}" "release/${{ matrix.exe_name }}" -Force
          Copy-Item "config.json" "release/config.json" -Force
          if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}" | Set-Content "release/version.txt"
          } else {
            "dev" | Set-Content "release/version.txt"
          }
          if (Test-Path "pythia.db") {
            Copy-Item "pythia.db" "release/pythia.db" -Force
          }

          # Server reads UI assets from src/ui at runtime.
          Copy-Item "src/ui/*" "release/src/ui" -Recurse -Force

          if (-not $IsWindows) {
            Copy-Item "src/ui/pic/PythiaJSIMG.png" "release/PythiaJS.png" -Force
          }

          # Server serves script modules at runtime.
          New-Item -ItemType Directory -Path release/src/script -Force | Out-Null
          Copy-Item "src/script/*" "release/src/script" -Recurse -Force

          # Base SQLite database for first-run initialization
          New-Item -ItemType Directory -Path release/src/db/base -Force | Out-Null
          Copy-Item "src/db/base/pythia.base.db" "release/src/db/base/pythia.base.db" -Force

          @"
          PythiaJS

          Run instructions:
          - Windows: double-click PythiaJS.exe
          - Linux: make executable and run from terminal
            chmod +x ./PythiaJS
            ./PythiaJS
          - macOS: open the bundled app, or if using the raw binary zip:
            chmod +x ./PythiaJS
            ./PythiaJS

          Notes:
          - This package expects bundled src/ui assets beside the executable.
          - Release version is read from version.txt and shown in the app footer.
          - WebView runtime must be available on the target OS.
          - Linux/macOS bundles include PythiaJS.png at the package root for launcher or app-icon setup.
          - If macOS blocks launch, move the app to Applications and then right-click > Open.
          - If macOS still blocks the app, remove quarantine from Terminal:
            xattr -dr com.apple.quarantine /Applications/PythiaJS.app
          "@ | Set-Content "release/RUN.txt"

      - name: Smoke test staged binary
        shell: pwsh
        run: |
          $testPort = 48731
          $exePath = (Resolve-Path "release/${{ matrix.exe_name }}").Path
          if (-not $IsWindows) {
            chmod +x $exePath
          }

          $env:PYTHIA_NO_BROWSER = "1"
          $env:PYTHIA_BROWSER_MODE = "1"
          $env:PYTHIA_PORT = "$testPort"
          $workDir = (Resolve-Path "release").Path
          $stdoutLog = Join-Path $workDir "smoke-stdout.log"
          $stderrLog = Join-Path $workDir "smoke-stderr.log"
          if (Test-Path $stdoutLog) { Remove-Item $stdoutLog -Force }
          if (Test-Path $stderrLog) { Remove-Item $stderrLog -Force }

          $proc = Start-Process -FilePath $exePath -WorkingDirectory $workDir -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -PassThru

          try {
            $ready = $false
            for ($i = 0; $i -lt 120; $i++) {
              Start-Sleep -Milliseconds 500

              if ($proc.HasExited) {
                $stdout = (Test-Path $stdoutLog) ? (Get-Content $stdoutLog -Raw) : ''
                $stderr = (Test-Path $stderrLog) ? (Get-Content $stderrLog -Raw) : ''
                throw "Staged binary exited early with code $($proc.ExitCode)`nSTDOUT:`n$stdout`nSTDERR:`n$stderr"
              }

              try {
                $resp = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:$testPort/api/getConnections" -TimeoutSec 2
                if ($resp.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              } catch {
                # Keep retrying until timeout.
              }
            }

            if (-not $ready) {
              $stdout = (Test-Path $stdoutLog) ? (Get-Content $stdoutLog -Raw) : ''
              $stderr = (Test-Path $stderrLog) ? (Get-Content $stderrLog -Raw) : ''
              throw "Staged binary smoke test failed: API did not become ready on port $testPort`nSTDOUT:`n$stdout`nSTDERR:`n$stderr"
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Create macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          app_root="release/PythiaJS.app"
          contents_dir="$app_root/Contents"
          macos_dir="$contents_dir/MacOS"
          resources_dir="$contents_dir/Resources"
          iconset_dir="$RUNNER_TEMP/PythiaJS.iconset"
          icon_source="src/ui/pic/PythiaJSIMG.png"

          rm -rf "$app_root" "$iconset_dir"
          mkdir -p "$macos_dir" "$resources_dir" "$iconset_dir"

          cp "release/${{ matrix.exe_name }}" "$macos_dir/PythiaJS"
          chmod +x "$macos_dir/PythiaJS"
          cp "release/config.json" "$macos_dir/config.json"
          cp "release/version.txt" "$macos_dir/version.txt"
          cp -R "release/src" "$macos_dir/src"
          cp "release/RUN.txt" "$resources_dir/RUN.txt"
          app_version="$(tr -d '\r\n' < release/version.txt)"

          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" "$icon_source" --out "$iconset_dir/icon_${size}x${size}.png" >/dev/null
            retina_size=$((size * 2))
            sips -z "$retina_size" "$retina_size" "$icon_source" --out "$iconset_dir/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$iconset_dir" -o "$resources_dir/PythiaJS.icns"

          cat > "$contents_dir/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>PythiaJS</string>
            <key>CFBundleExecutable</key>
            <string>PythiaJS</string>
            <key>CFBundleIconFile</key>
            <string>PythiaJS.icns</string>
            <key>CFBundleIdentifier</key>
            <string>org.pythiajs.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>PythiaJS</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$app_version</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_DEVELOPER_ID_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_DEVELOPER_ID_APPLICATION:-}" || -z "${APPLE_DEVELOPER_ID_CERT_P12:-}" || -z "${APPLE_DEVELOPER_ID_CERT_PASSWORD:-}" ]]; then
            echo "Apple signing secrets not configured. Skipping certificate import."
            exit 0
          fi

          cert_path="$RUNNER_TEMP/apple-dev-id.p12"
          keychain_path="$RUNNER_TEMP/pythiajs-signing.keychain-db"
          keychain_password="$(openssl rand -hex 16)"

          echo "$APPLE_DEVELOPER_ID_CERT_P12" | base64 --decode > "$cert_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychain -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')

      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_DEVELOPER_ID_APPLICATION:-}" ]]; then
            echo "Apple signing identity not configured. Skipping app signing."
            exit 0
          fi

          codesign --force --deep --options runtime --sign "$APPLE_DEVELOPER_ID_APPLICATION" "release/PythiaJS.app"
          codesign --verify --deep --strict --verbose=2 "release/PythiaJS.app"

      - name: Package macOS disk image
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          dmg_stage="$RUNNER_TEMP/PythiaJS-dmg"
          temp_dmg="$RUNNER_TEMP/PythiaJS-${{ matrix.platform }}-temp.dmg"
          dmg_name="PythiaJS-${{ matrix.platform }}.dmg"

          rm -rf "$dmg_stage"
          rm -f "$temp_dmg" "$dmg_name"
          mkdir -p "$dmg_stage/.background"

          cp -R "release/PythiaJS.app" "$dmg_stage/PythiaJS.app"
          cp "src/ui/pic/PythiaJS-bg.png" "$dmg_stage/.background/background.png"
          ln -s /Applications "$dmg_stage/Applications"
          chflags hidden "$dmg_stage/.background"

          hdiutil create -volname "PythiaJS" -srcfolder "$dmg_stage" -ov -format UDRW "$temp_dmg"
          attach_output="$(hdiutil attach "$temp_dmg" -noverify -noautoopen)"
          device="$(printf '%s\n' "$attach_output" | awk '$1 ~ /^\/dev\// {print $1; exit}')"

          if [[ -z "$device" ]]; then
            echo "Unable to determine mounted device from hdiutil attach output:"
            printf '%s\n' "$attach_output"
            exit 1
          fi

          if ! osascript <<EOF
          tell application "Finder"
            tell disk "PythiaJS"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {120, 120, 960, 620}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 144
              set text size of viewOptions to 16
              set background picture of viewOptions to file ".background:background.png"
              set position of item "PythiaJS.app" of container window to {220, 280}
              set position of item "Applications" of container window to {620, 280}
              close
              open
              update without registering applications
              delay 2
            end tell
          end tell
          EOF
          then
            echo "Finder styling failed; continuing with a plain drag-to-Applications DMG."
          fi

          sync
          hdiutil detach "$device"
          hdiutil convert "$temp_dmg" -format UDZO -imagekey zlib-level=9 -o "$dmg_name"

      - name: Sign macOS disk image
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_DEVELOPER_ID_APPLICATION:-}" ]]; then
            echo "Apple signing identity not configured. Skipping DMG signing."
            exit 0
          fi

          dmg_name="PythiaJS-${{ matrix.platform }}.dmg"
          codesign --force --sign "$APPLE_DEVELOPER_ID_APPLICATION" "$dmg_name"
          codesign --verify --verbose=2 "$dmg_name"

      - name: Notarize macOS disk image
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_NOTARY_APPLE_ID:-}" || -z "${APPLE_NOTARY_TEAM_ID:-}" || -z "${APPLE_NOTARY_APP_SPECIFIC_PASSWORD:-}" ]]; then
            echo "Apple notarization secrets not configured. Skipping notarization."
            exit 0
          fi

          dmg_name="PythiaJS-${{ matrix.platform }}.dmg"
          xcrun notarytool submit "$dmg_name" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$dmg_name"

      - name: Cleanup Apple signing keychain
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "$RUNNER_TEMP/pythiajs-signing.keychain-db" ]]; then
            security delete-keychain "$RUNNER_TEMP/pythiajs-signing.keychain-db" || true
          fi

      - name: Package zip
        if: runner.os != 'macOS'
        shell: pwsh
        run: |
          $zipName = "PythiaJS-${{ matrix.platform }}.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "release/*" -DestinationPath $zipName

      - name: Upload non-macOS artifact
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: PythiaJS-${{ matrix.platform }}
          path: PythiaJS-${{ matrix.platform }}.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: PythiaJS-${{ matrix.platform }}
          path: PythiaJS-${{ matrix.platform }}.dmg

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: PythiaJS-*
          merge-multiple: true
          path: release-assets

      - name: Verify at least one artifact exists
        id: artifact_check
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*.zip release-assets/*.dmg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifacts were produced. Skipping release publish."
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          echo "Artifacts to publish:"
          ls -1 release-assets/*

      - name: Publish release assets
        if: steps.artifact_check.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/*.dmg
          generate_release_notes: true
